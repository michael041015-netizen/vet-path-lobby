<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU VetPath - Digital Pathology Archive (Debug Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --ku-green: #006b3f; --ku-gold: #f2a900; --bg-gray: #f4f7f6; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 🔒 보안 로그인 화면 */
        #login-gate { margin-top: 12vh; text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--ku-green); width: 100%; max-width: 400px; }
        input[type="password"] { padding: 14px; width: 80%; border: 2px solid #eee; border-radius: 8px; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .btn-entry { padding: 14px 40px; background: var(--ku-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; width: 88%; }

        /* 📋 리스트 화면 */
        #content { display: none; width: 90%; max-width: 1100px; padding: 50px 0; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        header { text-align: center; margin-bottom: 50px; }
        header h1 { color: var(--ku-green); font-size: 2.2em; margin-bottom: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        
        /* 슬라이드 카드 */
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); border-color: var(--ku-gold); }
        .thumb { height: 170px; background: #e0e0e0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 🔧 디버그 정보 스타일 */
        .debug-info { padding: 10px; font-size: 0.8em; color: #888; background: #fafafa; border-top: 1px solid #eee; word-break: break-all; text-align: left; }
        .debug-status { font-weight: bold; margin-bottom: 5px; }
        .status-ok { color: green; }
        .status-err { color: red; }
        
        .footer { margin-top: 80px; text-align: center; padding: 30px 0; color: #999; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="login-gate">
        <img src="https://www.konkuk.ac.kr/images/common/logo.png" alt="KU Logo" style="width:170px; margin-bottom:25px;">
        <h2>Digital Pathology Lab</h2>
        <p>건국대학교 수의병리학교실<br>아카이브 접근을 위해 암호를 입력하세요.</p>
        <input type="password" id="pw-input" placeholder="Password" onkeypress="if(event.keyCode==13) checkAccess()"> <br>
        <button class="btn-entry" onclick="checkAccess()">입장하기</button>
    </div>

    <div id="content">
        <header>
            <h1>🔬 Slide Archive (Debug)</h1>
            <p>Konkuk Univ. | Lab: Nam-gyun Ki</p>
        </header>
        <div class="grid" id="slide-grid"></div>
        <div class="footer">&copy; 2026 Konkuk University.</div>
    </div>

    <script>
        // --- 슬라이드 데이터 (이 부분의 folder 값을 수정하셔야 합니다) ---
        const slides = [
            { name: "260326_1", url: "https://2601-cnp-1-5yqg5rb2p-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-1" },
            { name: "260326_3", url: "https://260326-3-2-yk6s.vercel.app/", folder: "260326-3-2" },
            { name: "260326_3-2", url: "https://260326-3-2.vercel.app/", folder: "260326-3-2" },
            { name: "260326_3-3", url: "https://260326-3-3.vercel.app/", folder: "260326-3-3" },
            { name: "260326_4", url: "https://260326-4.vercel.app/", folder: "260326-4" },
            { name: "260326_5", url: "https://260326-5.vercel.app/", folder: "260326-5" },
            { name: "-a_Cau2", url: "https://a-cau2.vercel.app/", folder: "-a_Cau2" },
            { name: "2601CNP_1", url: "https://2601-cnp-1-r03jdca46-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-1" },
            { name: "2601CNP_2", url: "https://2601-cnp-1-mowc6ebvh-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-2" },
            { name: "2601CNP-4", url: "https://2601-cnp-4.vercel.app/", folder: "2601CNP-4" },
            { name: "slide1", url: "https://slide1-nine.vercel.app/", folder: "slide1" },
            { name: "slide2", url: "https://slide2-nine.vercel.app/", folder: "slide2" }
        ];

        // --- 무한 새로고침 해결 & 디버그 정보 추가 로직 ---
        const grid = document.getElementById('slide-grid');
        const fragment = document.createDocumentFragment();

        slides.forEach(s => {
            const thumbUrl = `${s.url}/${s.folder}_files/0/0_0.jpg`;
            
            const card = document.createElement('a');
            card.href = s.url;
            card.target = '_blank';
            card.className = 'card';

            // 이미지 로드 성공/실패 체크를 위한 변수
            let isLoaded = false;

            card.innerHTML = `
                <div class="thumb">
                    <img src="${thumbUrl}" 
                         onload="document.getElementById('status-${s.name}').innerHTML='✅ URL 연결 성공'; document.getElementById('status-${s.name}').className='debug-status status-ok';"
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/300x170?text=Scan+Failed'; document.getElementById('status-${s.name}').innerHTML='❌ URL 연결 실패'; document.getElementById('status-${s.name}').className='debug-status status-err';">
                </div>
                <div class="debug-info">
                    <div class="debug-status" id="status-${s.name}">⏳ 연결 확인 중...</div>
                    <div style="font-weight:bold; color:#333; margin-bottom:3px;">표시 이름: ${s.name}</div>
                    <strong>시도한 썸네일 경로:</strong><br>
                    ${thumbUrl}
                </div>
            `;
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);

        function checkAccess() {
            const input = document.getElementById('pw-input').value;
            if(input === "2023") {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                alert("❌ 비밀번호가 올바르지 않습니다.");
                document.getElementById('pw-input').value = "";
            }
        }
    </script>
</body>
</html>

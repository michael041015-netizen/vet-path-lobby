<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU VetPath - Digital Pathology Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --ku-green: #006b3f; --ku-gold: #f2a900; --bg-gray: #f4f7f6; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 🔒 보안 로그인 화면 */
        #login-gate { margin-top: 15vh; text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--ku-green); width: 100%; max-width: 400px; }
        #login-gate h2 { color: var(--ku-green); margin-bottom: 10px; }
        input[type="password"] { padding: 14px; width: 85%; border: 2px solid #eee; border-radius: 8px; font-size: 16px; margin-bottom: 25px; outline-color: var(--ku-green); }
        .btn-entry { padding: 14px; background: var(--ku-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; width: 95%; transition: 0.3s; }
        .btn-entry:hover { background: #004d2e; transform: translateY(-2px); }

        /* 📋 리스트 화면 */
        #content { display: none; width: 90%; max-width: 1100px; padding: 50px 0; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { text-align: center; margin-bottom: 50px; }
        header h1 { color: var(--ku-green); font-size: 2.2em; margin-bottom: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* 슬라이드 카드 */
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; text-decoration: none; color: inherit; border: 1px solid #efefef; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--ku-gold); }
        .thumb { height: 180px; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .thumb::after { content: '🔬 VIEW SLIDE'; position: absolute; background: rgba(0,107,63,0.8); color: white; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; font-weight: bold; }
        .card:hover .thumb::after { opacity: 1; }
        
        .info { padding: 20px; text-align: center; font-weight: bold; color: #333; font-size: 1.1em; }
        .footer { margin-top: 80px; text-align: center; padding: 40px 0; color: #999; border-top: 1px solid #ddd; width: 100%; }
    </style>
</head>
<body>

    <div id="login-gate">
        <img src="https://www.konkuk.ac.kr/images/common/logo.png" alt="KU Logo" style="width:170px; margin-bottom:25px;">
        <h2>Digital Pathology Lab</h2>
        <p>건국대학교 수의병리학교실<br>아카이브 접근을 위해 암호를 입력하세요.</p>
        <input type="password" id="pw-input" placeholder="Password" onkeypress="if(event.keyCode==13) checkAccess()"> <br>
        <button class="btn-entry" onclick="checkAccess()">입장하기</button>
    </div>

    <div id="content">
        <header>
            <h1>🔬 Slide Archive</h1>
            <p>Konkuk Univ. College of Veterinary Medicine | Lab: Nam-gyun Ki</p>
        </header>

        <div class="grid" id="slide-grid">
            </div>

        <div class="footer">&copy; 2026 Konkuk University Veterinary Pathology.</div>
    </div>

    <script>
        // --- 슬라이드 데이터 (folder 이름만 정확히 확인해주세요!) ---
        const slides = [
            { name: "260326_1", url: "https://2601-cnp-1-5yqg5rb2p-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-1" },
            { name: "260326_3", url: "https://260326-3-2-yk6s.vercel.app/", folder: "260326-3-2" },
            { name: "260326_3-2", url: "https://260326-3-2.vercel.app/", folder: "260326-3-2" },
            { name: "260326_3-3", url: "https://260326-3-3.vercel.app/", folder: "260326-3-3" },
            { name: "260326_4", url: "https://260326-4.vercel.app/", folder: "260326-4" },
            { name: "260326_5", url: "https://260326-5.vercel.app/", folder: "260326-5" },
            { name: "-a_Cau2", url: "https://a-cau2.vercel.app/", folder: "-a_Cau2" },
            { name: "2601CNP_1", url: "https://2601-cnp-1-r03jdca46-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-1" },
            { name: "2601CNP_2", url: "https://2601-cnp-1-mowc6ebvh-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-2" },
            { name: "2601CNP-4", url: "https://2601-cnp-4.vercel.app/", folder: "2601CNP-4" },
            { name: "slide1", url: "https://slide1-nine.vercel.app/", folder: "slide1" },
            { name: "slide2", url: "https://slide2-nine.vercel.app/", folder: "slide2" }
        ];

        const grid = document.getElementById('slide-grid');
        slides.forEach(s => {
            const thumbUrl = `${s.url}/${s.folder}_files/0/0_0.jpg`;
            grid.innerHTML += `
                <a href="${s.url}" class="card" target="_blank">
                    <div class="thumb">
                        <img src="${thumbUrl}" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x180?text=Digital+Slide';">
                    </div>
                    <div class="info">${s.name}</div>
                </a>
            `;
        });

        function checkAccess() {
            if(document.getElementById('pw-input').value === "2023") {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                alert("❌ 비밀번호가 올바르지 않습니다.");
            }
        }
    </script>
</body>
</html>

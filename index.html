<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KU VetPath - Digital Pathology Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --ku-green: #006b3f; --ku-gold: #f2a900; --bg-gray: #f4f7f6; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 🔒 보안 로그인 화면 */
        #login-gate { margin-top: 12vh; text-align: center; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--ku-green); width: 100%; max-width: 400px; }
        #login-gate h2 { color: var(--ku-green); margin-bottom: 10px; }
        #login-gate p { color: #666; font-size: 0.95em; line-height: 1.6; margin-bottom: 25px; }
        input[type="password"] { padding: 14px; width: 80%; border: 2px solid #eee; border-radius: 8px; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input[type="password"]:focus { border-color: var(--ku-green); }
        .btn-entry { padding: 14px 40px; background: var(--ku-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; transition: 0.3s; width: 88%; }
        .btn-entry:hover { background: #004d2e; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,77,46,0.3); }

        /* 📋 리스트 화면 (입장 후) */
        #content { display: none; width: 90%; max-width: 1100px; padding: 50px 0; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        header { text-align: center; margin-bottom: 50px; }
        header h1 { color: var(--ku-green); font-size: 2.2em; margin-bottom: 10px; letter-spacing: -1px; }
        header p { color: #555; font-size: 1.1em; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        
        /* 슬라이드 카드 */
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #efefef; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); border-color: var(--ku-gold); }
        .thumb { height: 170px; background: #e0e0e0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .thumb img { scale: 1.1; }
        .thumb::after { content: '🔬 SLIDE VIEW'; position: absolute; background: rgba(0,107,63,0.8); color: white; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; font-weight: bold; font-size: 1.1em; }
        .card:hover .thumb::after { opacity: 1; }
        .info { padding: 18px; text-align: center; border-top: 1px solid #f0f0f0; }
        .info h3 { margin: 0; font-size: 1.15em; color: #222; font-weight: 700; }
        
        .footer { margin-top: 80px; color: #999; font-size: 0.85em; text-align: center; padding-bottom: 40px; border-top: 1px solid #ddd; padding-top: 30px; }
    </style>
</head>
<body>

    <div id="login-gate">
        <img src="https://www.konkuk.ac.kr/images/common/logo.png" alt="KU Logo" style="width:170px; margin-bottom:25px;">
        <h2>Digital Pathology Lab</h2>
        <p>건국대학교 수의병리학교실<br>아카이브 접근을 위해 암호를 입력하세요.</p>
        <input type="password" id="pw-input" placeholder="Password" onkeypress="if(event.keyCode==13) checkAccess()"> <br>
        <button class="btn-entry" onclick="checkAccess()">입장하기</button>
    </div>

    <div id="content">
        <header>
            <h1>🔬 Slide Archive</h1>
            <p>Konkuk Univ. College of Veterinary Medicine | Lab: Nam-gyun Ki</p>
        </header>

        <div class="grid" id="slide-grid">
            </div>

        <div class="footer">
            &copy; 2026 Konkuk University Veterinary Pathology. All Rights Reserved.<br>
            Designed for Digital Diagnostics Education.
        </div>
    </div>

    <script>
        // -------------------------------------------------------------------------
        // 1. 슬라이드 리스트 데이터 설정
        // name: 화면에 표시될 슬라이드 이름
        // url: Vercel 배포 주소
        // folder: [중요] 해당 Vercel 서버 내 실제 타일 폴더 이름 (예: '2601CNP-1_files' 면 '2601CNP-1' 만 입력)
        // -------------------------------------------------------------------------
        const slides = [
            { name: "260326_1", url: "https://2601-cnp-1-5yqg5rb2p-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-1" },
            { name: "260326_3", url: "https://260326-3-2-yk6s.vercel.app/", folder: "260326-3-2" },
            { name: "260326_3-2", url: "https://260326-3-2.vercel.app/", folder: "260326-3-2" },
            { name: "260326_3-3", url: "https://260326-3-3.vercel.app/", folder: "260326-3-3" },
            { name: "260326_4", url: "https://260326-4.vercel.app/", folder: "260326-4" },
            { name: "260326_5", url: "https://260326-5.vercel.app/", folder: "260326-5" },
            { name: "-a_Cau2", url: "https://a-cau2.vercel.app/", folder: "-a_Cau2" },
            { name: "2601CNP_1", url: "https://2601-cnp-1-r03jdca46-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-1" },
            { name: "2601CNP_2", url: "https://2601-cnp-1-mowc6ebvh-michael041015-netizens-projects.vercel.app/", folder: "2601CNP-2" },
            { name: "2601CNP-4", url: "https://2601-cnp-4.vercel.app/", folder: "2601CNP-4" },
            { name: "slide1", url: "https://slide1-nine.vercel.app/", folder: "slide1" },
            { name: "slide2", url: "https://slide2-nine.vercel.app/", folder: "slide2" }
        ];

        // 2. 리스트 화면 구성 로직
        const grid = document.getElementById('slide-grid');
        slides.forEach(s => {
            // 썸네일 경로: Vercel주소/folder이름_files/0/0_0.jpg
            const thumbUrl = `${s.url}/${s.folder}_files/0/0_0.jpg`;
            
            grid.innerHTML += `
                <a href="${s.url}" class="card" target="_blank">
                    <div class="thumb">
                        <img src="${thumbUrl}" onerror="this.src='https://via.placeholder.com/300x170?text=Scan+to+Thumbnail'">
                    </div>
                    <div class="info">
                        <h3>${s.name}</h3>
                    </div>
                </a>
            `;
        });

        // 3. 비밀번호 확인 로직 (2023)
        function checkAccess() {
            const input = document.getElementById('pw-input').value;
            if(input === "2023") {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                alert("❌ 비밀번호가 올바르지 않습니다.");
                document.getElementById('pw-input').value = "";
            }
        }
    </script>
</body>
</html>
